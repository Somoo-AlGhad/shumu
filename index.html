<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظمة شموع الغد للأيتام</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 150px; border-radius: 10px; margin-bottom: 20px; }
        h1 { color: #0056b3; margin-bottom: 10px; }
        .description { font-size: 1.1rem; line-height: 1.6; color: #555; margin-bottom: 30px; }
        .contact-info { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 30px; border: 1px solid #ddd; }
        .social-links a { display: inline-block; margin: 10px; text-decoration: none; color: #fff; padding: 12px 25px; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .facebook { background-color: #1877f2; }
        .whatsapp { background-color: #25d366; }
        .social-links a:hover { opacity: 0.8; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="container">
        <!-- تم تصحيح اسم الشعار هنا ليعمل فوراً -->
        <img src="FB_IMG_1778717757319.jpg" alt="شعار المنظمة" class="logo">
        
        <h1>منظمة شموع الغد للأيتام</h1>
        <p class="description">
            نعمل في منظمة شموع الغد على تقديم الدعم الشامل للأيتام والأرامل والعوائل المتعففة في مدينة النجف الأشرف لضمان حياة كريمة لهم.
        </p>

        <div class="contact-info">
            <h3>تواصل معنا مباشرة</h3>
            <p>المقر: العراق - النجف الأشرف</p>
            
            <div class="social-links">
                <!-- ضع روابطك الحقيقية هنا بدلاً من علامة # -->
                <a href="#" class="facebook">صفحتنا على فيسبوك</a>
                <a href="https://wa.me/964" class="whatsapp">تواصل عبر واتساب</a>
            </div>
        </div>
    </div>

</body>
</html>
