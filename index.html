<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظمة شموع الغد للأيتام</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo {
            width: 150px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h1 { color: #0056b3; margin-bottom: 10px; }
        .description { font-size: 1.1rem; line-height: 1.6; color: #555; }
        
        /* قسم معرض الصور */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .gallery img:hover { transform: scale(1.05); }

        /* قسم التواصل */
        .contact-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .social-links a {
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .facebook { background-color: #1877f2; }
        .whatsapp { background-color: #25d366; }
    </style>
</head>
<body>

    <div class="container">
        <!-- الشعار -->
        <img src="FB_IMG_17787177871777085.jpg" alt="شعار المنظمة" class="logo">
        
        <h1>منظمة شموع الغد للأيتام</h1>
        <p class="description">
            نعمل في منظمة شموع الغد على تقديم الدعم الشامل للأيتام والأرامل لضمان حياة كريمة لهم.
        </p>

        <hr>

        <!-- قسم صور أعمال المنظمة -->
        <h3>من أعمالنا</h3>
        <div class="gallery">
            <!-- استبدل "work1.jpg" بأسماء صورك الحقيقية التي سترفعها -->
            <img src="work1.jpg" alt="نشاط 1">
            <img src="work2.jpg" alt="نشاط 2">
            <img src="work3.jpg" alt="نشاط 3">
        </div>

        <!-- قسم التواصل -->
        <div class="contact-info">
            <h3>تواصل معنا</h3>
            <p>الهاتف: 07XXXXXXXXX</p>
            <p>العنوان: العراق - النجف الأشرف</p>
            
            <div class="social-links">
                <!-- استبدل الروابط بروابط صفحاتكم الحقيقية -->
                <a href="https://facebook.com/yourpage" class="facebook">فيسبوك</a>
                <a href="https://wa.me/9647XXXXXXXXX" class="whatsapp">واتساب</a>
            </div>
        </div>
    </div>

</body>
</html>
